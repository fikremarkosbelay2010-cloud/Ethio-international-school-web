<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio International School Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* HIGH-PERFORMANCE MOTION BACKGROUND */
        #bg-image {
            transition: transform 0.4s cubic-bezier(0.05, 0.7, 0.1, 1);
            will-change: transform;
            background-image: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=2070');
            background-size: cover;
            background-position: center;
        }
        
        /* VIBRANT COLORFUL OVERLAY */
        .vibrant-overlay {
            background: linear-gradient(135deg, 
                rgba(15, 23, 42, 0.9) 0%, 
                rgba(30, 58, 138, 0.4) 50%, 
                rgba(192, 38, 211, 0.25) 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(251, 191, 36, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }
        
        .school-title {
            background: linear-gradient(to bottom right, #fff, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-slate-950 h-screen w-full flex items-center justify-center overflow-hidden font-sans text-white">

    <div id="motion-container" class="absolute inset-0 z-0 scale-110">
        <div id="bg-image" class="absolute inset-0 h-full w-full opacity-70"></div>
        <div class="vibrant-overlay absolute inset-0 h-full w-full"></div>
    </div>

    <div class="relative z-10 w-full max-w-[420px] px-6">
        <div class="glass-card rounded-[3rem] p-10 md:p-12 border-t border-white/10">
            
            <div class="text-center mb-12">
                <div class="inline-flex p-3 rounded-2xl bg-amber-500/10 border border-amber-500/20 mb-4">
                    <svg class="w-8 h-8 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M12 14l9-5-9-5-9 5 9 5z"></path>
                        <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path>
                    </svg>
                </div>
                <h1 class="text-3xl font-black tracking-tight uppercase school-title">Ethio International</h1>
                <p class="text-amber-500/70 text-[10px] font-bold uppercase tracking-[0.4em] mt-2">Authorized Access Portal</p>
            </div>

            <div class="space-y-4">
                <button id="loginBtn" class="w-full flex items-center justify-center gap-4 bg-white text-slate-900 py-4 rounded-2xl font-bold hover:bg-amber-50 transition-all active:scale-95 shadow-xl">
                    <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5 h-5">
                    Continue with Google
                </button>

                <button id="appleBtn" class="w-full flex items-center justify-center gap-4 bg-black text-white py-4 rounded-2xl font-bold border border-white/10 hover:bg-zinc-900 transition-all active:scale-95">
                    <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.039 2.48-4.5 2.597-4.571-1.429-2.09-3.623-2.324-4.402-2.376-1.831-.156-3.442 1.104-4.39 1.104zM15.541 1.31c.844-1.026 1.403-2.454 1.247-3.87-1.208.052-2.675.818-3.532 1.831-.78.909-1.455 2.364-1.273 3.74 1.35.104 2.714-.714 3.558-1.701z"/></svg>
                    Continue with Apple
                </button>
            </div>

            <div class="mt-10 pt-6 border-t border-white/5 text-center">
                <p class="text-[9px] text-slate-500 uppercase tracking-widest font-medium">Secure School System v2.0</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, OAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Integrated Your Specific Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDV6d0Ge02rzWCqBPEmAUSXuxPLU_QJSDk",
            authDomain: "ethio-international-school.firebaseapp.com",
            projectId: "ethio-international-school",
            storageBucket: "ethio-international-school.firebasestorage.app",
            messagingSenderId: "956874907448",
            appId: "1:956874907448:web:e24c3153f48e31fefaebcd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();
        const appleProvider = new OAuthProvider('apple.com');

        const ADMIN_EMAIL = "fikredbelay2002@gmail.com";

        // Unified Login Handler
        async function startLogin(provider) {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // Silent Detection & Routing
                if (user.email === ADMIN_EMAIL) {
                    console.log("Admin Access Detected.");
                    window.location.href = "admin.html";
                } else {
                    console.log("General User Access Detected.");
                    window.location.href = "portal.html";
                }
            } catch (error) {
                console.error(error);
                alert("Login encountered an issue. Please try again.");
            }
        }

        document.getElementById('loginBtn').onclick = () => startLogin(googleProvider);
        document.getElementById('appleBtn').onclick = () => startLogin(appleProvider);

        // Parallax Motion Sensitivity
        const bg = document.getElementById('bg-image');
        window.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 35;
            const y = (window.innerHeight / 2 - e.pageY) / 35;
            bg.style.transform = `translate(${x}px, ${y}px) scale(1.1)`;
        });
    </script>
</body>
</html>
