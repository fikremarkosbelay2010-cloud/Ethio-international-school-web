<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio International School Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #bg-image {
            transition: transform 0.3s cubic-bezier(0.1, 0.4, 0.2, 1);
            will-change: transform;
            background-image: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=2070');
            background-size: cover;
            background-position: center;
        }
        .vibrant-overlay {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(30, 58, 138, 0.3) 50%, rgba(192, 38, 211, 0.2) 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(251, 191, 36, 0.2);
        }
    </style>
</head>
<body class="bg-slate-950 h-screen w-full flex items-center justify-center overflow-hidden font-sans text-white">

    <div id="motion-container" class="absolute inset-0 z-0 scale-110">
        <div id="bg-image" class="absolute inset-0 h-full w-full opacity-70"></div>
        <div class="vibrant-overlay absolute inset-0 h-full w-full"></div>
    </div>

    <div class="relative z-10 w-full max-w-[420px] px-6">
        <div class="glass-card rounded-[2.5rem] p-10 shadow-2xl border-t-2 border-t-amber-500/50">
            
            <div class="text-center mb-10">
                <h1 class="text-3xl font-black tracking-tight text-white uppercase">Ethio International</h1>
                <p class="text-amber-500 text-[10px] font-bold uppercase tracking-[0.4em] mt-1">Unified School Portal</p>
            </div>

            <div class="space-y-4">
                <button id="loginBtn" class="w-full flex items-center justify-center gap-4 bg-white text-slate-900 py-4 rounded-2xl font-bold hover:bg-amber-50 transition-all active:scale-95 shadow-xl">
                    <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-6 h-6">
                    Continue with Google
                </button>

                <button id="appleBtn" class="w-full flex items-center justify-center gap-4 bg-black text-white py-4 rounded-2xl font-bold border border-white/10 hover:bg-zinc-900 transition-all active:scale-95">
                    <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.039 2.48-4.5 2.597-4.571-1.429-2.09-3.623-2.324-4.402-2.376-1.831-.156-3.442 1.104-4.39 1.104zM15.541 1.31c.844-1.026 1.403-2.454 1.247-3.87-1.208.052-2.675.818-3.532 1.831-.78.909-1.455 2.364-1.273 3.74 1.35.104 2.714-.714 3.558-1.701z"/></svg>
                    Continue with Apple
                </button>
            </div>

            <div class="mt-8 text-center opacity-40">
                <p class="text-[9px] uppercase tracking-widest">© 2026 Ethio International School</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // REPLACE WITH YOUR FIREBASE KEYS
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const ADMIN_EMAIL = "fikredbelay2002@gmail.com";

        document.getElementById('loginBtn').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // SILENT DETECTION LOGIC
                if (user.email === ADMIN_EMAIL) {
                    console.log("Admin detected.");
                    window.location.href = "admin.html";
                } else {
                    console.log("Teacher/Parent/Student detected.");
                    window.location.href = "portal.html";
                }
            } catch (error) {
                alert("Login failed. Check your connection.");
            }
        };

        // MOTION EFFECT
        const bg = document.getElementById('bg-image');
        window.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 30;
            const y = (window.innerHeight / 2 - e.pageY) / 30;
            bg.style.transform = `translate(${x}px, ${y}px) scale(1.1)`;
        });
    </script>
</body>
</html>
